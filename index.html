<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الألعاب المصغرة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: #e43f5a;
            margin-bottom: 10px;
        }
        p {
            color: #e2e2e2;
            font-size: 1.1rem;
        }
        .games-list {
            margin: 30px 0;
            padding: 0;
            list-style: none;
        }
        .games-list li {
            background: #1f4068;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            border-right: 5px solid #e43f5a;
            transition: transform 0.2s;
        }
        .games-list li:hover {
            transform: scale(1.03);
            background: #234877;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 قائمة الألعاب الخاصة بك</h1>
        <p>مرحباً بك! هذه صفحة تجريبية بسيطة تعرض الألعاب المرفوعة على الاستضافة:</p>
        
        <ul class="games-list">
            <li>🎯 لعبة تخمين الرقم</li>
            <li>🎲 لعبة رمي النرد</li>
            <li>✂️ لعبة حجر ورقة مقص</li>
            <li>🏆 لوحة الصدارة والترتيب</li>
        </ul>

        <div class="footer">
            تم التصميم للتجربة على Netlify ✨
        </div>
    </div>

</body>
</html>
